<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumping Turtle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
body {
  background: #f7f7f7;
  font-family: system-ui, sans-serif;
  padding: 0;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}
canvas {
  background: #fff;
  display: block;
  width: 100%;
  aspect-ratio: 800 / 300;
  touch-action: none;
}
.score {
  position: fixed;
  top: clamp(0.5rem, 2vw, 1rem);
  right: clamp(0.5rem, 2vw, 1rem);
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: #555;
  z-index: 10;
  pointer-events: none;
}
.pause-btn {
  position: fixed;
  top: clamp(0.5rem, 2vw, 1rem);
  left: clamp(0.5rem, 2vw, 1rem);
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  width: clamp(36px, 8vw, 48px);
  height: clamp(36px, 8vw, 48px);
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: #fff;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pause-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 20;
  justify-content: center;
  align-items: center;
}
.pause-overlay.active { display: flex; }
.pause-box {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 2rem 3rem;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.pause-box h2 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  color: #333;
}
.pause-box button {
  display: block;
  width: 100%;
  margin: 0.5rem 0;
  padding: 0.6rem 1.5rem;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.pause-box button:hover { background: #d63851; }
.pause-box button.secondary { background: #555; }
.pause-box button.secondary:hover { background: #444; }
</style>
</head>
<body>
<canvas id="game" width="800" height="300"></canvas>
<div class="score" id="score">0</div>
<button class="pause-btn" onclick="togglePause()">⏸</button>
<div class="pause-overlay" id="pauseOverlay">
  <div class="pause-box">
    <h2>⏸ Пауза</h2>
    <button onclick="resumeGame()">▶ Продолжить</button>
    <button class="secondary" onclick="quitToMenu()">🏠 В главное меню</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const GROUND = 250;
let bestScore = parseInt(localStorage.getItem('dino_best') || '0');
const GRAVITY = 0.6;
let gameOver = false;
let paused = false;
let score = 0;
let frame = 0;

const dino = {
  x: 80,
  y: GROUND,
  w: 44,
  h: 48,
  vy: 0,
  jumping: false,
  leg: 0,
};

const obstacles = [];
const clouds = [];

for (let i = 0; i < 4; i++) {
  clouds.push({
    x: Math.random() * canvas.width,
    y: 30 + Math.random() * 80,
    w: 40 + Math.random() * 30,
    speed: 0.2 + Math.random() * 0.3,
  });
}

let spawnTimer = 0;
let holdJump = false;
let audioCtx = null;

function playJumpSound() {
  try {
    if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(250, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
  } catch (_) {}
}

function jump() {
  if (!dino.jumping && !gameOver) {
    dino.vy = -12;
    dino.jumping = true;
    playJumpSound();
  }
}

function reset() {
  gameOver = false;
  score = 0;
  frame = 0;
  obstacles.length = 0;
  dino.y = GROUND;
  dino.vy = 0;
  dino.jumping = false;
  spawnTimer = 0;
  holdJump = false;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (paused) return;
    if (gameOver) reset();
    else { holdJump = true; jump(); }
  }
  if (e.code === 'Escape') {
    e.preventDefault();
    togglePause();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    holdJump = false;
  }
});

var tapActive = false;
document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (paused) return;
  if (tapActive) return;
  if (gameOver) reset();
  else { holdJump = true; jump(); }
});
document.addEventListener('mouseup', () => { if (!tapActive) holdJump = false; });
document.addEventListener('mouseleave', () => { if (!tapActive) holdJump = false; });
document.addEventListener('touchstart', (e) => {
  if (e.target.closest('button, .pause-overlay, .score')) return;
  tapActive = true;
  if (paused) return;
  if (gameOver) reset();
  else { holdJump = true; jump(); }
}, { passive: false });
document.addEventListener('touchend', () => {
  tapActive = false;
  holdJump = false;
});
document.addEventListener('touchcancel', () => {
  tapActive = false;
  holdJump = false;
});

window.addEventListener('message', (e) => {
  if (e.data === 'pause') togglePause();
});

function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawDino() {
  const { x, y, w, h } = dino;
  const shellC = '#66bb6a';
  const lightC = '#a5d6a7';
  const darkC = '#388e3c';
  const legOff = !dino.jumping ? Math.floor(frame / 6) % 2 : 0;

  // tail
  rect(x + 2, y - h + 32, 6, 4, lightC);

  // shell (rounded)
  rect(x + 6, y - h + 14, w - 10, h - 18, shellC);
  rect(x + 8, y - h + 10, w - 14, 6, shellC);
  rect(x + 12, y - h + 8, w - 22, 4, shellC);

  // shell pattern
  rect(x + 10, y - h + 20, 8, 6, darkC);
  rect(x + 22, y - h + 22, 6, 4, darkC);

  // head
  rect(x + w - 10, y - h + 8, 14, 12, lightC);
  rect(x + w, y - h + 10, 8, 8, lightC);
  rect(x + w - 12, y - h + 12, 4, 6, lightC);

  // eye dot
  rect(x + w - 2, y - h + 11, 3, 3, '#333');

  // back leg
  rect(x + 10, y - 6, 8, 6, lightC);

  // front leg
  rect(x + 24 + legOff * 3, y - 6, 8, 6, lightC);
}

function drawCactus(o) {
  rect(o.x, o.y - o.h, o.w, o.h, '#2e7d32');
  rect(o.x - 4, o.y - o.h + 8, 6, 6, '#2e7d32');
  rect(o.x + o.w - 2, o.y - o.h + 12, 6, 6, '#2e7d32');
}

function drawBird(o) {
  const y = o.y;
  const flap = Math.floor(frame / 8) % 2;
  ctx.fillStyle = '#555';
  ctx.fillRect(o.x, y - 4, 16, 8); // body
  if (flap) {
    ctx.fillRect(o.x + 4, y - 14, 8, 10); // wings up
  } else {
    ctx.fillRect(o.x - 4, y - 4, 8, 4); // wings back
    ctx.fillRect(o.x + 12, y - 4, 8, 4);
  }
  ctx.fillRect(o.x - 2, y - 1, 5, 4); // beak
}

function drawCloud(o) {
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.ellipse(o.x, o.y, o.w / 2, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(o.x - o.w * 0.25, o.y + 3, o.w * 0.3, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(o.x + o.w * 0.25, o.y + 3, o.w * 0.3, 8, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  rect(0, GROUND + 2, canvas.width, 2, '#333');
}

function update(dt) {
  if (gameOver || paused) return;
  frame += dt;

  if (holdJump && dino.jumping && dino.vy < 0) dino.vy -= 0.15 * dt;
  dino.vy += GRAVITY * dt;
  dino.y += dino.vy * dt;
  if (dino.y >= GROUND) {
    dino.y = GROUND;
    dino.vy = 0;
    dino.jumping = false;
  }

  const speed = (4 + Math.floor(score / 50)) * dt;

  // clouds
  for (const c of clouds) {
    c.x -= c.speed * dt;
    if (c.x + c.w < 0) {
      c.x = canvas.width + c.w;
      c.y = 20 + Math.random() * 90;
    }
  }

  // spawn obstacles/birds
  spawnTimer += dt;
  const sizeBonus = Math.min(20, Math.floor(score / 15));
  const minGap = score > 50 ? 10 : Math.max(15, 50 - Math.floor(score / 5));
  if (spawnTimer > minGap + Math.random() * (score > 50 ? 10 : 20)) {
    const r = Math.random();
    if (score > 30 && r < 0.2) {
      const birdY = [GROUND - 60 - sizeBonus, GROUND - 35, GROUND - 95 - sizeBonus][Math.floor(Math.random() * 3)];
      obstacles.push({ x: canvas.width, y: birdY, w: 20, h: 16, type: 'bird', giveScore: true });
    } else {
      const count = [2, 2, 3, 3][Math.floor(Math.random() * 4)];
      const h = 30 + sizeBonus + Math.random() * 20;
      const w = 12 + Math.floor(sizeBonus / 5) + Math.random() * 8;
      for (let i = 0; i < count; i++) {
        obstacles.push({
          x: canvas.width + i * (20 + Math.random() * 15),
          y: GROUND + 2,
          w,
          h,
          type: 'cactus',
          giveScore: i === 0,
        });
      }
    }
    spawnTimer = 0;
  }

  // move
  for (const o of obstacles) {
    o.x -= speed;
  }
  while (obstacles.length && obstacles[0].x + obstacles[0].w < 0) {
    const o = obstacles.shift();
    if (o.giveScore !== false) {
      score++;
      scoreEl.textContent = score;
    }
  }

  // collision
  const dinoBox = { x: dino.x + 4, y: dino.y - dino.h + 14, w: dino.w - 8, h: dino.h - 14 };
  for (const o of obstacles) {
    let ox, oy, ow, oh;
    if (o.type === 'bird') {
      ox = o.x; oy = o.y - 8; ow = 20; oh = 16;
    } else {
      ox = o.x; oy = o.y - o.h; ow = o.w; oh = o.h;
    }
    if (
      dinoBox.x < ox + ow &&
      dinoBox.x + dinoBox.w > ox &&
      dinoBox.y < oy + oh &&
      dinoBox.y + dinoBox.h > oy
    ) {
      gameOver = true;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('dino_best', String(bestScore));
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const c of clouds) drawCloud(c);
  drawGround();

  for (const o of obstacles) {
    if (o.type === 'bird') drawBird(o);
    else drawCactus(o);
  }
  drawDino();

  if (gameOver) {
    const fs = Math.max(16, canvas.width * 0.03);
    const fs2 = Math.max(11, canvas.width * 0.016);
    const cx = canvas.width / 2;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(cx - 140, canvas.height * 0.26, 280, canvas.height * 0.35);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fs}px system-ui`;
    ctx.fillText('Game Over', cx, canvas.height * 0.33);
    ctx.font = `${fs2}px system-ui`;
    ctx.fillText(`Очки: ${score}  Рекорд: ${bestScore}`, cx, canvas.height * 0.45);
    ctx.fillText('Нажми пробел для рестарта', cx, canvas.height * 0.55);
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseOverlay').classList.toggle('active', paused);
}

function resumeGame() {
  paused = false;
  document.getElementById('pauseOverlay').classList.remove('active');
}

function quitToMenu() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('dino_best', String(bestScore));
  }
  parent.postMessage({ type: 'closeGame', best: bestScore, key: 'dino_best' }, '*');
}

let lastTime = 0;

function loop(time) {
  const dt = lastTime ? Math.min((time - lastTime) / (1000 / 60), 3) : 1;
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
