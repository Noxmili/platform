<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluffy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
body {
  overflow: hidden;
  background: #1a1a2e;
  font-family: system-ui, sans-serif;
  -webkit-touch-callout: none;
  touch-action: manipulation;
  margin: 0;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  display: block;
  background: #87ceeb;
  touch-action: none;
}
.score {
  position: fixed;
  top: clamp(0.5rem, 2vw, 1rem);
  right: clamp(0.5rem, 2vw, 1rem);
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: #555;
  z-index: 10;
  pointer-events: none;
}
.pause-btn {
  position: fixed;
  top: clamp(0.5rem, 2vw, 1rem);
  left: clamp(0.5rem, 2vw, 1rem);
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  width: clamp(36px, 8vw, 48px);
  height: clamp(36px, 8vw, 48px);
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: #fff;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pause-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 20;
  justify-content: center;
  align-items: center;
}
.pause-overlay.active { display: flex; }
.pause-box {
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 2rem 3rem;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.pause-box h2 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  color: #333;
}
.pause-box button {
  display: block;
  width: 100%;
  margin: 0.5rem 0;
  padding: 0.6rem 1.5rem;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #e94560;
  color: #fff;
  transition: background 0.2s;
}
.pause-box button:hover { background: #d63851; }
.pause-box button.secondary { background: #555; }
.pause-box button.secondary:hover { background: #444; }
</style>
</head>
<body>
<canvas id="game" width="800" height="300"></canvas>
  <div class="score" id="score">0</div>
  <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸</button>
  <div class="pause-overlay" id="pauseOverlay">
  <div class="pause-box">
    <h2>⏸ Пауза</h2>
    <button onclick="resumeGame()">▶ Продолжить</button>
    <button class="secondary" onclick="quitToMenu()">🏠 В главное меню</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const scale = Math.min(maxW / 800, maxH / 300);
  const w = Math.floor(800 * scale);
  const h = Math.floor(300 * scale);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const GRAVITY = 0.45;
const FLAP = -5.5;
const PIPE_W = 36;
const PIPE_GAP = 95;
const PIPE_SPEED = 2.2;
const GROUND = 270;

let bestScore = parseInt(localStorage.getItem('fluffy_best') || '0');
let gameOver = false;
let paused = false;
let score = 0;
let frame = 0;

const bird = {
  x: 100,
  y: 150,
  r: 10,
  vy: 0,
  rotation: 0,
};

const pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

function reset() {
  gameOver = false;
  score = 0;
  frame = 0;
  bird.y = 150;
  bird.vy = 0;
  bird.rotation = 0;
  pipes.length = 0;
  pipeTimer = 0;
}

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playHitSound() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    osc.start();
    osc.stop(ac.currentTime + 0.2);
  } catch (_) {}
}

function playScoreSound() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(523, ac.currentTime);
    osc.frequency.setValueAtTime(659, ac.currentTime + 0.06);
    gain.gain.setValueAtTime(0.06, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start();
    osc.stop(ac.currentTime + 0.15);
  } catch (_) {}
}

function flap() {
  if (!gameOver) {
    bird.vy = FLAP;
    playScoreSound();
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseOverlay').classList.toggle('active', paused);
}

function resumeGame() {
  paused = false;
  document.getElementById('pauseOverlay').classList.remove('active');
}

function quitToMenu() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('fluffy_best', String(bestScore));
  }
  parent.postMessage({ type: 'closeGame', best: bestScore, key: 'fluffy_best' }, '*');
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (paused) return;
    if (gameOver) reset();
    else flap();
  }
  if (e.code === 'Escape') {
    e.preventDefault();
    togglePause();
  }
});

document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (paused) return;
  if (gameOver) reset();
  else flap();
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (paused) return;
  if (gameOver) reset();
  else flap();
}, { passive: false });

window.addEventListener('message', (e) => {
  if (e.data === 'pause') togglePause();
});

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r, bird.r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e8a820';
  ctx.beginPath();
  ctx.ellipse(4, -2, bird.r * 0.5, bird.r * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff6b35';
  ctx.beginPath();
  ctx.moveTo(8, -2);
  ctx.lineTo(16, 0);
  ctx.lineTo(8, 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(4, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPipe(x, topH) {
  const bottomY = topH + PIPE_GAP;
  const bottomH = GROUND - bottomY;
  ctx.fillStyle = '#4a9e3f';
  ctx.fillRect(x, 0, PIPE_W, topH);
  ctx.fillRect(x, bottomY, PIPE_W, bottomH);
  ctx.fillStyle = '#5cbf4f';
  ctx.fillRect(x - 3, topH - 20, PIPE_W + 6, 16);
  ctx.fillRect(x - 3, bottomY, PIPE_W + 6, 16);
  ctx.fillStyle = '#3a7e2f';
  ctx.fillRect(x, 0, 4, topH);
  ctx.fillRect(x, bottomY, 4, bottomH);
}

function drawGround() {
  ctx.fillStyle = '#8BC34A';
  ctx.fillRect(0, GROUND, 800, 30);
  ctx.fillStyle = '#689F38';
  ctx.fillRect(0, GROUND, 800, 3);
}

function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(canvas.width / 800, canvas.height / 300);
  ctx.clearRect(0, 0, 800, 300);
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, 800, GROUND);

  for (const p of pipes) {
    drawPipe(p.x, p.topH);
  }

  drawGround();
  drawBird();

  if (gameOver) {
    const fs = Math.max(16, 24);
    const fs2 = Math.max(11, 13);
    const cx = 400;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(cx - 140, 78, 280, 105);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fs}px system-ui`;
    ctx.fillText('Game Over', cx, 99);
    ctx.font = `${fs2}px system-ui`;
    ctx.fillText(`Очки: ${score}  Рекорд: ${bestScore}`, cx, 135);
    ctx.fillText('Нажми пробел для рестарта', cx, 165);
  }
}

function update(dt) {
  if (gameOver || paused) return;
  frame += dt;

  bird.vy += GRAVITY * dt;
  bird.y += bird.vy * dt;
  bird.rotation = Math.max(-0.5, Math.min(1.2, bird.vy * 0.08));

  if (bird.y > GROUND - bird.r) {
    bird.y = GROUND - bird.r;
    bird.vy = 0;
    gameOver = true;
    playHitSound();
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('fluffy_best', String(bestScore));
    }
  }
  if (bird.y < bird.r) {
    bird.y = bird.r;
    bird.vy = 0;
  }

  pipeTimer += dt;
  if (pipeTimer > PIPE_INTERVAL) {
    const minH = 30;
    const maxH = GROUND - PIPE_GAP - 30;
    const topH = minH + Math.random() * (maxH - minH);
    pipes.push({ x: 800, topH });
    pipeTimer = 0;
  }

  for (const p of pipes) {
    p.x -= PIPE_SPEED * dt;
  }

  while (pipes.length && pipes[0].x + PIPE_W < 0) {
    pipes.shift();
  }

  for (const p of pipes) {
    const bx = bird.x - bird.r;
    const by = bird.y - bird.r * 0.8;
    const bw = bird.r * 2;
    const bh = bird.r * 1.6;

    const topPipeHit = (
      bx < p.x + PIPE_W &&
      bx + bw > p.x &&
      by < p.topH &&
      by + bh > 0
    );
    const bottomPipeHit = (
      bx < p.x + PIPE_W &&
      bx + bw > p.x &&
      by < GROUND &&
      by + bh > p.topH + PIPE_GAP
    );

    if (topPipeHit || bottomPipeHit) {
      gameOver = true;
      playHitSound();
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('fluffy_best', String(bestScore));
      }
    }

    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      scoreEl.textContent = score;
    }
  }
}

let lastTime = 0;

function loop(time) {
  const dt = lastTime ? Math.min((time - lastTime) / (1000 / 60), 3) : 1;
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
