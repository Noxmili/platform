<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluffy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  background: #f7f7f7;
  font-family: system-ui, sans-serif;
  padding: 0.5rem;
}
canvas {
  border: 2px solid #aaa;
  background: #87ceeb;
  width: 100%;
  max-width: 800px;
  aspect-ratio: 800 / 300;
}
.score {
  position: fixed;
  top: clamp(0.5rem, 2vw, 1rem);
  right: clamp(0.5rem, 2vw, 1rem);
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: #555;
  z-index: 10;
}
</style>
</head>
<body>
<canvas id="game" width="800" height="300"></canvas>
<div class="score" id="score">0</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const GRAVITY = 0.45;
const FLAP = -5.5;
const PIPE_W = 36;
const PIPE_GAP = 95;
const PIPE_SPEED = 2.2;
const GROUND = 270;

let bestScore = parseInt(localStorage.getItem('fluffy_best') || '0');
let gameOver = false;
let score = 0;
let frame = 0;

const bird = {
  x: 100,
  y: 150,
  r: 10,
  vy: 0,
  rotation: 0,
};

const pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

function reset() {
  gameOver = false;
  score = 0;
  frame = 0;
  bird.y = 150;
  bird.vy = 0;
  bird.rotation = 0;
  pipes.length = 0;
  pipeTimer = 0;
}

function playHitSound() {
  try {
    const ac = new (AudioContext || webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    osc.start();
    osc.stop(ac.currentTime + 0.2);
  } catch (_) {}
}

function playScoreSound() {
  try {
    const ac = new (AudioContext || webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(523, ac.currentTime);
    osc.frequency.setValueAtTime(659, ac.currentTime + 0.06);
    gain.gain.setValueAtTime(0.06, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start();
    osc.stop(ac.currentTime + 0.15);
  } catch (_) {}
}

function flap() {
  if (!gameOver) {
    bird.vy = FLAP;
    playScoreSound();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameOver) reset();
    else flap();
  }
});

document.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (gameOver) reset();
  else flap();
});

document.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) reset();
  else flap();
}, { passive: false });

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r, bird.r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e8a820';
  ctx.beginPath();
  ctx.ellipse(4, -2, bird.r * 0.5, bird.r * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff6b35';
  ctx.beginPath();
  ctx.moveTo(8, -2);
  ctx.lineTo(16, 0);
  ctx.lineTo(8, 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(4, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPipe(x, topH) {
  const bottomY = topH + PIPE_GAP;
  const bottomH = GROUND - bottomY;
  ctx.fillStyle = '#4a9e3f';
  ctx.fillRect(x, 0, PIPE_W, topH);
  ctx.fillRect(x, bottomY, PIPE_W, bottomH);
  ctx.fillStyle = '#5cbf4f';
  ctx.fillRect(x - 3, topH - 20, PIPE_W + 6, 16);
  ctx.fillRect(x - 3, bottomY, PIPE_W + 6, 16);
  ctx.fillStyle = '#3a7e2f';
  ctx.fillRect(x, 0, 4, topH);
  ctx.fillRect(x, bottomY, 4, bottomH);
}

function drawGround() {
  ctx.fillStyle = '#8BC34A';
  ctx.fillRect(0, GROUND, canvas.width, canvas.height - GROUND);
  ctx.fillStyle = '#689F38';
  ctx.fillRect(0, GROUND, canvas.width, 3);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, canvas.width, GROUND);

  for (const p of pipes) {
    drawPipe(p.x, p.topH);
  }

  drawGround();
  drawBird();

  if (gameOver) {
    const fs = Math.max(16, canvas.width * 0.03);
    const fs2 = Math.max(11, canvas.width * 0.016);
    const cx = canvas.width / 2;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(cx - 140, canvas.height * 0.26, 280, canvas.height * 0.35);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fs}px system-ui`;
    ctx.fillText('Game Over', cx, canvas.height * 0.33);
    ctx.font = `${fs2}px system-ui`;
    ctx.fillText(`Очки: ${score}  Рекорд: ${bestScore}`, cx, canvas.height * 0.45);
    ctx.fillText('Нажми пробел для рестарта', cx, canvas.height * 0.55);
  }
}

function update(dt) {
  if (gameOver) return;
  frame += dt;

  bird.vy += GRAVITY * dt;
  bird.y += bird.vy * dt;
  bird.rotation = Math.max(-0.5, Math.min(1.2, bird.vy * 0.08));

  if (bird.y > GROUND - bird.r) {
    bird.y = GROUND - bird.r;
    bird.vy = 0;
    gameOver = true;
    playHitSound();
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('fluffy_best', String(bestScore));
    }
  }
  if (bird.y < bird.r) {
    bird.y = bird.r;
    bird.vy = 0;
  }

  pipeTimer += dt;
  if (pipeTimer > PIPE_INTERVAL) {
    const minH = 30;
    const maxH = GROUND - PIPE_GAP - 30;
    const topH = minH + Math.random() * (maxH - minH);
    pipes.push({ x: canvas.width, topH });
    pipeTimer = 0;
  }

  for (const p of pipes) {
    p.x -= PIPE_SPEED * dt;
  }

  while (pipes.length && pipes[0].x + PIPE_W < 0) {
    pipes.shift();
  }

  for (const p of pipes) {
    const bx = bird.x - bird.r;
    const by = bird.y - bird.r * 0.8;
    const bw = bird.r * 2;
    const bh = bird.r * 1.6;

    const topPipeHit = (
      bx < p.x + PIPE_W &&
      bx + bw > p.x &&
      by < p.topH &&
      by + bh > 0
    );
    const bottomPipeHit = (
      bx < p.x + PIPE_W &&
      bx + bw > p.x &&
      by < GROUND &&
      by + bh > p.topH + PIPE_GAP
    );

    if (topPipeHit || bottomPipeHit) {
      gameOver = true;
      playHitSound();
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('fluffy_best', String(bestScore));
      }
    }

    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      scoreEl.textContent = score;
    }
  }
}

let lastTime = 0;

function loop(time) {
  const dt = lastTime ? Math.min((time - lastTime) / (1000 / 60), 3) : 1;
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
